<!DOCTYPE html>
<html>
    <head>
        <title>Login - Sistema Contable</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../assets/css/login.css">
    </head>
    <body>
        <div class="container login-container d-flex justify-content-center align-items-center">
            <div class="card shadow-lg login-card" style="width: 800px;">
                <div class="row g-0">

                    <!-- PANEL IZQUIERDO -->
                    <div class="col-md-6 left-panel d-flex flex-column justify-content-center">
                        <h2>Bienvenido </h2>
                        <p class="mt-3">
                            Gestiona tus clientes, ingresos y gastos de manera eficiente.
                            Este sistema está diseñado para facilitar tu trabajo contable.
                        </p>
                        <hr class="bg-light">
                        <p>
                            ✔ Control de clientes<br>
                            ✔ Registro de movimientos<br>
                            ✔ Reportes claros
                        </p>
                    </div>

                    <!-- PANEL DERECHO -->
                    <div class="col-md-6 p-4 bg-white">
                        <h3 class="text-center mb-4">Iniciar Sesión</h3>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="ejemplo@gmail.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="********" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                            <div class="text-center mt-3">
                                <small>
                                    ¿Aún no tienes una cuenta? 
                                    <a href="register.html">Regístrate aquí</a>
                                </small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
